services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379
      MCS_TOKENS: ${MCS_TOKENS:-}
      MCS_STREAM_MAXLEN: ${MCS_STREAM_MAXLEN:-10000}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
