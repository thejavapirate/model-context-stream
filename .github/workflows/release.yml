name: release

# Tag a version to publish everything:
#   git tag v0.2.0 && git push origin v0.2.0
# Ships: multi-arch image -> ghcr.io/thejavapirate/model-context-stream
#        helm chart       -> oci://ghcr.io/thejavapirate/charts/model-context-stream
on:
  push:
    tags: ["v*"]

env:
  IMAGE: ghcr.io/${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.v.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart:
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Resolve version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Package and push chart
        run: |
          helm package deploy/helm/model-context-stream \
            --version "${{ steps.v.outputs.version }}" \
            --app-version "${{ steps.v.outputs.version }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u "${{ github.actor }}" --password-stdin
          helm push "model-context-stream-${{ steps.v.outputs.version }}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

  github-release:
    runs-on: ubuntu-latest
    needs: [image, chart]
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME" --notes "
          **Prebuilt artifacts:**
          - Image: \`ghcr.io/${{ github.repository }}:$VERSION\` (amd64 + arm64)
          - Chart: \`helm install mcs oci://ghcr.io/${{ github.repository_owner }}/charts/model-context-stream --version $VERSION\`
          "
